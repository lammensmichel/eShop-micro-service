# webapp — front Blazor WASM (sert le client + son appsettings.json public).
# Aucune dépendance backend : le navigateur appelle les APIs via l'Ingress.
# Zéro-interruption (maxUnavailable=0), securityContext durci, PDB minAvailable=1.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: eshop
  labels:
    app.kubernetes.io/part-of: eshop
    app.kubernetes.io/name: webapp
spec:
  # 2 réplicas pour le front (haute dispo + rolling update sans coupure).
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: webapp
  # minReadySeconds : on attend 10s qu'un nouveau pod soit stable avant disponible.
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # zéro-interruption : on ne tue jamais un pod avant qu'un neuf soit prêt.
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: eshop
        app.kubernetes.io/name: webapp
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      # 30s pour drainer les requêtes en cours avant le SIGKILL (arrêt propre).
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
      containers:
        - name: webapp
          image: ghcr.io/lammensmichel/webapp:__TAG__
          ports:
            - containerPort: 8080
          # Pas d'env backend : les URLs publiques arrivent via le volume monté
          # ci-dessous (appsettings.json du WASM). Seuls les réglages runtime restent.
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: DOTNET_ENVIRONMENT
              value: "Production"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # readinessProbe : sort le pod du Service tant que /health échoue.
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 3
          # livenessProbe : redémarre le pod si /alive échoue (deadlock, etc.).
          livenessProbe:
            httpGet:
              path: /alive
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 3
          # startupProbe : tolère un démarrage lent (jusqu'à 150s) avant liveness.
          startupProbe:
            httpGet:
              path: /alive
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            # readOnlyRootFilesystem=true : emptyDir inscriptible monté sur /tmp.
            - name: tmp
              mountPath: /tmp
            # Override de l'appsettings.json du WASM avec les URLs publiques
            # (ConfigMap webapp-appsettings, clé appsettings.json). subPath pour
            # ne remplacer QUE ce fichier sans masquer le reste de wwwroot.
            - name: webapp-appsettings
              mountPath: /app/wwwroot/appsettings.json
              subPath: appsettings.json
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: webapp-appsettings
          configMap:
            name: webapp-appsettings
---
apiVersion: v1
kind: Service
metadata:
  name: webapp
  namespace: eshop
  labels:
    app.kubernetes.io/part-of: eshop
    app.kubernetes.io/name: webapp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: webapp
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
---
# PDB : au moins 1 pod disponible lors des disruptions volontaires (drain/maintenance).
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: webapp
  namespace: eshop
  labels:
    app.kubernetes.io/part-of: eshop
    app.kubernetes.io/name: webapp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: webapp

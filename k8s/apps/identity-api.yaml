# identity-api — autorité OIDC (Duende IdentityServer + ASP.NET Identity, Postgres identitydb).
# Zéro-interruption (maxUnavailable=0), securityContext durci, PDB minAvailable=1.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-api
  namespace: eshop
  labels:
    app.kubernetes.io/part-of: eshop
    app.kubernetes.io/name: identity-api
spec:
  # 2 réplicas pour les APIs (haute dispo + rolling update sans coupure).
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: identity-api
  # minReadySeconds : on attend 10s qu'un nouveau pod soit stable avant disponible.
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # zéro-interruption : on ne tue jamais un pod avant qu'un neuf soit prêt.
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: eshop
        app.kubernetes.io/name: identity-api
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      # 30s pour drainer les requêtes en cours avant le SIGKILL (arrêt propre).
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
      containers:
        - name: identity-api
          image: ghcr.io/lammensmichel/identity-api:__TAG__
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: DOTNET_ENVIRONMENT
              value: "Production"
            # Derrière l'Ingress : nécessaire pour que l'issuer OIDC émis = l'URL
            # publique (https://id.__DOMAIN__) et non l'adresse interne du pod.
            - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
              value: "true"
            # Chaîne de connexion injectée depuis le Secret eshop-connstrings.
            - name: ConnectionStrings__identitydb
              valueFrom:
                secretKeyRef:
                  name: eshop-connstrings
                  key: ConnectionStrings__identitydb
            # URL publique du front (valeur non secrète) depuis eshop-config.
            - name: Identity__WebAppUrl
              valueFrom:
                configMapKeyRef:
                  name: eshop-config
                  key: Identity__WebAppUrl
            - name: Identity__IssuerUri
              valueFrom:
                configMapKeyRef:
                  name: eshop-config
                  key: Identity__IssuerUri
            - name: Identity__SeedDemoUsers
              valueFrom:
                configMapKeyRef:
                  name: eshop-config
                  key: Identity__SeedDemoUsers
            - name: Identity__RequireHttpsMetadata
              valueFrom:
                configMapKeyRef:
                  name: eshop-config
                  key: Identity__RequireHttpsMetadata
            # Mot de passe de démo : secret, depuis eshop-secrets.
            - name: Identity__DemoPassword
              valueFrom:
                secretKeyRef:
                  name: eshop-secrets
                  key: identity-demo-password
            # Les migrations sont jouées par un Job dédié, jamais au démarrage.
            - name: RunMigrationsAtStartup
              value: "false"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # readinessProbe : sort le pod du Service tant que /health échoue.
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 3
          # livenessProbe : redémarre le pod si /alive échoue (deadlock, etc.).
          livenessProbe:
            httpGet:
              path: /alive
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 3
          # startupProbe : tolère un démarrage lent (jusqu'à 150s) avant liveness.
          startupProbe:
            httpGet:
              path: /alive
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # readOnlyRootFilesystem=true : emptyDir inscriptible monté sur /tmp.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: identity-api
  namespace: eshop
  labels:
    app.kubernetes.io/part-of: eshop
    app.kubernetes.io/name: identity-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: identity-api
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
---
# PDB : au moins 1 pod disponible lors des disruptions volontaires (drain/maintenance).
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: identity-api
  namespace: eshop
  labels:
    app.kubernetes.io/part-of: eshop
    app.kubernetes.io/name: identity-api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: identity-api

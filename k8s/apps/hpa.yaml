# HorizontalPodAutoscaler — montée en charge automatique des composants
# qui reçoivent du trafic utilisateur (les 3 APIs front + le webapp).
# Cible : 70% de CPU moyen. Min 2 (= la dispo de base des Deployments),
# max 5. Les workers ne sont PAS autoscalés (charge pilotée par la file RabbitMQ).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: catalog-api
  namespace: eshop
  labels:
    app.kubernetes.io/part-of: eshop
    app.kubernetes.io/name: catalog-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: catalog-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

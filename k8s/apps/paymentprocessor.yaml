# paymentprocessor — worker (BackgroundService) consommant RabbitMQ.
# Passé en WebApplication : il expose /health et /alive -> mêmes sondes que les APIs.
# Un Service ClusterIP est conservé pour les sondes/headless. PDB minAvailable=1.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paymentprocessor
  namespace: eshop
  labels:
    app.kubernetes.io/part-of: eshop
    app.kubernetes.io/name: paymentprocessor
spec:
  # 1 réplica pour un worker (l'idempotence consumer protège déjà les doublons).
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paymentprocessor
  # minReadySeconds : on attend 10s qu'un nouveau pod soit stable avant disponible.
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # zéro-interruption : on ne tue jamais un pod avant qu'un neuf soit prêt.
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: eshop
        app.kubernetes.io/name: paymentprocessor
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      # 30s pour finir le message en cours (ack/nack) avant le SIGKILL (arrêt propre).
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
      containers:
        - name: paymentprocessor
          image: ghcr.io/lammensmichel/paymentprocessor:__TAG__
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: DOTNET_ENVIRONMENT
              value: "Production"
            # Chaîne de connexion RabbitMQ injectée depuis eshop-connstrings.
            - name: ConnectionStrings__rabbitmq
              valueFrom:
                secretKeyRef:
                  name: eshop-connstrings
                  key: ConnectionStrings__rabbitmq
            # En prod, le paiement réussit (pas de simulation d'échec).
            - name: Payment__AlwaysFail
              value: "false"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # readinessProbe : sort le pod du Service tant que /health échoue.
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 3
          # livenessProbe : redémarre le pod si /alive échoue (deadlock, etc.).
          livenessProbe:
            httpGet:
              path: /alive
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 3
          # startupProbe : tolère un démarrage lent (jusqu'à 150s) avant liveness.
          startupProbe:
            httpGet:
              path: /alive
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              # worker : empreinte mémoire plus faible (96Mi) au repos.
              cpu: 100m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # readOnlyRootFilesystem=true : emptyDir inscriptible monté sur /tmp.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: paymentprocessor
  namespace: eshop
  labels:
    app.kubernetes.io/part-of: eshop
    app.kubernetes.io/name: paymentprocessor
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: paymentprocessor
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
---
# PDB : au moins 1 pod disponible lors des disruptions volontaires (drain/maintenance).
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: paymentprocessor
  namespace: eshop
  labels:
    app.kubernetes.io/part-of: eshop
    app.kubernetes.io/name: paymentprocessor
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paymentprocessor

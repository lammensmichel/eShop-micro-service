# ordering-api — API web des commandes (Postgres orderingdb + RabbitMQ + Identity).
# Zéro-interruption (maxUnavailable=0), securityContext durci, PDB minAvailable=1.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ordering-api
  namespace: eshop
  labels:
    app.kubernetes.io/part-of: eshop
    app.kubernetes.io/name: ordering-api
spec:
  # 2 réplicas pour les APIs (haute dispo + rolling update sans coupure).
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ordering-api
  # minReadySeconds : on attend 10s qu'un nouveau pod soit stable avant disponible.
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # zéro-interruption : on ne tue jamais un pod avant qu'un neuf soit prêt.
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: eshop
        app.kubernetes.io/name: ordering-api
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      # 30s pour drainer les requêtes en cours avant le SIGKILL (arrêt propre).
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
      containers:
        - name: ordering-api
          image: ghcr.io/lammensmichel/ordering-api:__TAG__
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: DOTNET_ENVIRONMENT
              value: "Production"
            # Chaînes de connexion injectées depuis le Secret eshop-connstrings.
            - name: ConnectionStrings__orderingdb
              valueFrom:
                secretKeyRef:
                  name: eshop-connstrings
                  key: ConnectionStrings__orderingdb
            - name: ConnectionStrings__rabbitmq
              valueFrom:
                secretKeyRef:
                  name: eshop-connstrings
                  key: ConnectionStrings__rabbitmq
            # Valeurs publiques (non secrètes) depuis le ConfigMap eshop-config.
            - name: Cors__AllowedOrigins__0
              valueFrom:
                configMapKeyRef:
                  name: eshop-config
                  key: Cors__AllowedOrigins__0
            - name: Identity__Url
              valueFrom:
                configMapKeyRef:
                  name: eshop-config
                  key: Identity__Url
            - name: Identity__RequireHttpsMetadata
              valueFrom:
                configMapKeyRef:
                  name: eshop-config
                  key: Identity__RequireHttpsMetadata
            # Les migrations sont jouées par un Job dédié, jamais au démarrage.
            - name: RunMigrationsAtStartup
              value: "false"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # readinessProbe : sort le pod du Service tant que /health échoue.
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 3
          # livenessProbe : redémarre le pod si /alive échoue (deadlock, etc.).
          livenessProbe:
            httpGet:
              path: /alive
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 3
          # startupProbe : tolère un démarrage lent (jusqu'à 150s) avant liveness.
          startupProbe:
            httpGet:
              path: /alive
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # readOnlyRootFilesystem=true : emptyDir inscriptible monté sur /tmp.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ordering-api
  namespace: eshop
  labels:
    app.kubernetes.io/part-of: eshop
    app.kubernetes.io/name: ordering-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ordering-api
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
---
# PDB : au moins 1 pod disponible lors des disruptions volontaires (drain/maintenance).
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ordering-api
  namespace: eshop
  labels:
    app.kubernetes.io/part-of: eshop
    app.kubernetes.io/name: ordering-api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ordering-api

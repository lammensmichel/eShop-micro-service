# ClusterIssuer cert-manager pour Let's Encrypt (production ACME).
# Ressource cluster-scoped (PAS de namespace).
# Le placeholder __ACME_EMAIL__ est substitué par start-prod.sh (sed).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app.kubernetes.io/part-of: eshop
    app.kubernetes.io/name: letsencrypt-prod
spec:
  acme:
    # Serveur ACME de production Let's Encrypt.
    server: https://acme-v02.api.letsencrypt.org/directory
    # Email de contact (notifications d'expiration).
    email: __ACME_EMAIL__
    # Secret stockant la clé privée du compte ACME.
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    # Validation des domaines via le challenge HTTP-01, résolu par l'ingress nginx.
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx

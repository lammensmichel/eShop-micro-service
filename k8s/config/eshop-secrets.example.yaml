# =============================================================================
# MODÈLE de Secret — NE PAS COMMITER LES VRAIES VALEURS.
# -----------------------------------------------------------------------------
# Ce fichier sert UNIQUEMENT de gabarit / documentation des clés attendues.
# En production, start-prod.sh génère le vrai Secret `eshop-secrets` :
#   - il crée des mots de passe forts et aléatoires si absents,
#   - puis il compose le Secret `eshop-connstrings` à partir de ces valeurs.
# Ne JAMAIS versionner les vraies valeurs (toutes ici sont des exemples CHANGEME).
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: eshop-secrets
  namespace: eshop
  labels:
    app.kubernetes.io/part-of: eshop
    app.kubernetes.io/name: eshop-secrets
type: Opaque
stringData:
  # Mot de passe du super-utilisateur Postgres (postgres).
  postgres-password: "CHANGEME"
  # Mot de passe Redis (requirepass).
  redis-password: "CHANGEME"
  # Utilisateur et mot de passe RabbitMQ (RABBITMQ_DEFAULT_USER / _PASS).
  rabbitmq-user: "CHANGEME"
  rabbitmq-password: "CHANGEME"
  # Mot de passe des utilisateurs de démo Identity (si seed activé).
  identity-demo-password: "CHANGEME"

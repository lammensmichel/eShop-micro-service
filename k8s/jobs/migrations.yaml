---
# Migration de identitydb (Postgres) + seed optionnel des utilisateurs de démo.
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-identity
  namespace: eshop
  labels:
    app.kubernetes.io/part-of: eshop
    app.kubernetes.io/name: identity-api
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: eshop
        app.kubernetes.io/name: identity-api
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-creds
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
      containers:
        - name: migrate-identity
          image: ghcr.io/lammensmichel/identity-api:__TAG__
          args: ["--migrate"]
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: DOTNET_ENVIRONMENT
              value: "Production"
            - name: ConnectionStrings__identitydb
              valueFrom:
                secretKeyRef:
                  name: eshop-connstrings
                  key: ConnectionStrings__identitydb
            # Seed des utilisateurs de démo (valeur non secrète) depuis eshop-config.
            - name: Identity__SeedDemoUsers
              valueFrom:
                configMapKeyRef:
                  name: eshop-config
                  key: Identity__SeedDemoUsers
            # Mot de passe de démo : secret, depuis eshop-secrets.
            - name: Identity__DemoPassword
              valueFrom:
                secretKeyRef:
                  name: eshop-secrets
                  key: identity-demo-password
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
